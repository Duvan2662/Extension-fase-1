<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CapturePro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #0d0d0f;
      color: #e8e8e0;
      font-family: 'DM Sans', sans-serif;
      padding: 20px;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c8f542;
      margin-bottom: 4px;
    }

    p.sub {
      font-size: 11px;
      color: #666;
      margin-bottom: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      margin-bottom: 8px;
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      border-radius: 6px;
      color: #e8e8e0;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s ease;
    }

    .btn:hover {
      background: #222228;
      border-color: #c8f542;
      color: #c8f542;
    }

    .btn.primary {
      background: #c8f542;
      border-color: #c8f542;
      color: #0d0d0f;
      font-weight: 600;
    }

    .btn.primary:hover {
      background: #d4f760;
    }

    .status {
      margin-top: 12px;
      font-size: 11px;
      color: #555;
      font-family: 'Space Mono', monospace;
    }

    .status span {
      color: #c8f542;
    }
  </style>
</head>
<body>
  <h1>CapturePro</h1>
  <p class="sub">Screenshots → Excel</p>

  <button class="btn primary" id="toggleOverlay">⚡ Mostrar overlay</button>
  <button class="btn" id="injectOverlay">↺ Re-inyectar overlay</button>

  <div class="status" id="status">Estado: <span>esperando...</span></div>

  <script type="module" src="src/popup.js"></script>
</body>
</html>
